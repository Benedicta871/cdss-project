<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore CDSS | Clinical Decision Dashboard</title>

    <!-- CORRECT CSS PATH (ROOT) -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-shell">

    <header class="topbar">
        <div class="brand">
            🧠 MediCore <span>CDSS</span>
        </div>
        <div id="systemMeta" class="meta"></div>
    </header>

    <section class="kpi-row" id="kpiRow"></section>

    <div class="layout">

        <aside class="sidebar">
            <h3>Patients</h3>
            <div id="patientList"></div>
        </aside>

        <main class="main">
            <div id="roleBanner" class="role-banner"></div>
            <div class="card" id="resultsCard"></div>
            <div class="card" id="labView"></div>
        </main>

        <aside class="rightbar">
            <div class="card" id="insightsCard"></div>

            <div class="card">
                <h3>Recent Activity</h3>
                <div id="auditTrail"></div>
            </div>
        </aside>

    </div>

</div>

<!-- CORRECT SCRIPT PATHS (ROOT) -->
<script src="state.js"></script>
<script src="dataService.js"></script>
<script src="clinicalEngine.js"></script>
<script src="components.js"></script>
<script src="uiRenderer.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>

</body>
</html>
