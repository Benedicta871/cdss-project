<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore CDSS | Clinical Decision Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app-shell">

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="brand">
            🧠 MediCore <span>CDSS</span>
        </div>

        <div id="systemMeta" class="meta"></div>
    </header>

    <!-- KPI ROW -->
    <section class="kpi-row" id="kpiRow"></section>

    <!-- MAIN GRID -->
    <div class="layout">

        <!-- LEFT: PATIENT LIST -->
        <aside class="sidebar">
            <h3>Patients</h3>
            <div id="patientList"></div>
        </aside>

        <!-- CENTER: MAIN DASHBOARD -->
        <main class="main">

            <div id="roleBanner" class="role-banner"></div>

            <div class="card" id="resultsCard"></div>

            <div class="card" id="labView"></div>

        </main>

        <!-- RIGHT: INSIGHTS -->
        <aside class="rightbar">

            <div class="card" id="insightsCard"></div>

            <div class="card">
                <h3>Recent Activity</h3>
                <div id="auditTrail"></div>
            </div>

        </aside>

    </div>

</div>

<!-- SCRIPTS (KEEP AS IS) -->
<script src="js/dataService.js"></script>
<script src="js/clinicalEngine.js"></script>
<script src="js/components.js"></script>
<script src="js/uiRenderer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
